    d="M31.4 38.4c-3.1-2.4-6.8-3.4-9.9-2.6-1.2.3-2.1 1.1-2.5 2.2 3.1 2.8 7.1 4.5 11.2 4.9-.1-1.6.1-3 .1-4.5Z"
  />
  <!-- Outer right petal -->
  <path
    fill="url(#soulara-gold)"
    opacity="0.78"
    d="M32.6 38.4c3.1-2.4 6.8-3.4 9.9-2.6 1.2.3 2.1 1.1 2.5 2.2-3.1 2.8-7.1 4.5-11.2 4.9.1-1.6-.1-3-.1-4.5Z"
  />

